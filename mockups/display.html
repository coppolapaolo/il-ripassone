<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Il Ripassone — Display pubblico</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --navy: #1E3A5F;
    --navy-deep: #122544;
    --teal: #3795B5;
    --azure: #7FB9CC;
    --gold: #E8A93C;
    --gold-deep: #B27D1E;
    --paper: #F4F7FA;
    --ink: #0F172A;
    --ink-soft: #475569;
    --rule: #E2E8F0;
    --success: #15803D;
    --danger: #B91C1C;
  }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); }
  .serif { font-family: 'Playfair Display', serif; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .stage-bg {
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(55,149,181,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(232,169,60,0.06), transparent 60%),
      var(--paper);
  }
  .panel {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 18px;
    box-shadow:
      0 1px 2px rgba(15,23,42,0.04),
      0 8px 24px -8px rgba(15,23,42,0.08);
  }
  .panel-tinted { background: linear-gradient(180deg, #ffffff 0%, #F8FAFC 100%); }

  .accent-bar { height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--navy), var(--teal), var(--azure)); }

  .tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    color: var(--ink-soft);
  }

  /* Countdown ring */
  .ring-track { stroke: #E2E8F0; }
  .ring-progress {
    stroke: var(--teal);
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .ring-progress.warn { stroke: var(--gold); }
  .ring-progress.danger { stroke: var(--danger); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* Score bump */
  @keyframes scoreUp {
    0% { transform: translateY(0) scale(1); color: var(--ink); }
    35% { transform: translateY(-8px) scale(1.18); color: var(--success); }
    100% { transform: translateY(0) scale(1); color: var(--ink); }
  }
  .score-bump { animation: scoreUp 1.4s ease-out; }

  /* Reveal */
  @keyframes revealCorrect {
    0% { box-shadow: 0 0 0 0 rgba(21,128,61,0); transform: scale(1); }
    35% { box-shadow: 0 0 0 6px rgba(21,128,61,0.18); transform: scale(1.01); }
    100% { box-shadow: 0 0 0 0 rgba(21,128,61,0); transform: scale(1); }
  }
  .reveal-correct {
    background: linear-gradient(180deg, #F0FDF4 0%, #ECFDF5 100%) !important;
    border-color: #86EFAC !important;
    animation: revealCorrect 1.6s ease-out;
  }
  .reveal-correct .opt-letter { color: var(--success) !important; }
  .reveal-wrong { opacity: 0.45; }

  /* Team row hover-less; bar fill */
  .team-bar-fill { transition: width 1s cubic-bezier(0.34,1.56,0.64,1); }

  /* Status pip */
  .pip { width: 6px; height: 6px; border-radius: 99px; display: inline-block; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pip-live { background: #22C55E; animation: blink 1.6s ease-in-out infinite; }

  /* Logo color pickup (white background of logo blends in) */
  .logo-img { mix-blend-mode: multiply; }

  /* Subtle row hover for asking team */
  .asking-team {
    background: linear-gradient(90deg, rgba(232,169,60,0.10), rgba(232,169,60,0.02)) !important;
    border-color: rgba(232,169,60,0.45) !important;
  }
  .answering-team {
    background: linear-gradient(90deg, rgba(55,149,181,0.10), rgba(55,149,181,0.02)) !important;
    border-color: rgba(55,149,181,0.45) !important;
  }
</style>
</head>
<body class="stage-bg min-h-screen">

<div x-data="display()" class="min-h-screen flex flex-col p-6 gap-5">

  <!-- HEADER -->
  <header class="flex items-center justify-between">
    <div class="flex items-center gap-5">
      <img src="assets/logo.png" alt="Il Ripassone" class="h-16 logo-img" />
    </div>
    <div class="flex items-center gap-3">
      <div class="panel px-5 py-2.5 flex items-center gap-3">
        <span class="tag">Round</span>
        <span class="serif text-3xl font-bold leading-none" style="color:var(--navy)" x-text="round"></span>
        <span class="text-slate-300">/</span>
        <span class="text-slate-500 text-lg" x-text="totalRounds"></span>
      </div>
      <button @click="togglePhase()" class="panel px-4 py-2.5 text-xs text-slate-500 hover:text-[var(--navy)]">
        ⇄ <span class="serif text-base" x-text="phase"></span>
      </button>
    </div>
  </header>

  <div class="accent-bar"></div>

  <!-- LEADERBOARD -->
  <section class="grid grid-cols-4 gap-4">
    <template x-for="(t, idx) in teams" :key="t.id">
      <div class="panel p-4 relative overflow-hidden"
           :class="t.id === askingTeam.id ? 'asking-team' : (t.id === answeringTeam.id ? 'answering-team' : '')">
        <!-- side accent -->
        <div class="absolute left-0 top-0 bottom-0 w-1" :style="`background: ${t.color}`"></div>
        <div class="pl-2">
          <div class="flex items-center justify-between mb-1.5">
            <div class="flex items-baseline gap-2">
              <span class="serif text-2xl font-semibold" style="color:var(--ink-soft)" x-text="'#' + (idx+1)"></span>
              <span class="serif text-xl font-semibold" :style="`color: ${t.color}`" x-text="t.name"></span>
            </div>
            <template x-if="t.id === askingTeam.id">
              <span class="text-[10px] font-semibold uppercase tracking-widest px-2 py-0.5 rounded" style="background:rgba(232,169,60,0.18); color:var(--gold-deep)">Pone</span>
            </template>
            <template x-if="t.id === answeringTeam.id">
              <span class="text-[10px] font-semibold uppercase tracking-widest px-2 py-0.5 rounded" style="background:rgba(55,149,181,0.18); color:#1E5F76">Risponde</span>
            </template>
          </div>
          <div class="flex items-baseline gap-2">
            <span class="serif text-5xl font-bold tabular-nums leading-none" :class="t.bumped && 'score-bump'" x-text="t.score"></span>
            <span class="text-slate-400 text-xs">pt</span>
          </div>
          <!-- progress bar -->
          <div class="mt-3 h-1.5 rounded-full bg-slate-100 overflow-hidden">
            <div class="h-full team-bar-fill rounded-full" :style="`width: ${barPct(t.score)}%; background: ${t.color}`"></div>
          </div>
          <div class="text-[11px] text-slate-500 mt-2 truncate">
            <span class="font-medium" x-text="t.captain"></span><span class="text-slate-400"> · </span><span x-text="t.members + ' membri'"></span>
          </div>
        </div>
      </div>
    </template>
  </section>

  <!-- STAGE -->
  <main class="flex-1 grid grid-cols-12 gap-5 items-stretch">

    <!-- Sinistra: meta turno -->
    <aside class="col-span-3 flex flex-col gap-4">
      <div class="panel p-5">
        <div class="tag mb-2">Pone la domanda</div>
        <div class="serif text-2xl font-semibold leading-tight" :style="`color: ${askingTeam.color}`" x-text="askingTeam.name"></div>
        <div class="text-xs text-slate-500 mt-1.5">Capitano · <span class="text-slate-700 font-medium" x-text="askingTeam.captain"></span></div>
      </div>

      <div class="panel p-5">
        <div class="tag mb-2">Risponde</div>
        <template x-if="question.target === 'open'">
          <div>
            <div class="serif text-2xl font-semibold leading-tight" style="color:var(--teal)">Aperta a tutti</div>
            <div class="text-xs text-slate-500 mt-1.5">Primo capitano che risponde, blocca le altre squadre</div>
          </div>
        </template>
        <template x-if="question.target !== 'open'">
          <div>
            <div class="serif text-2xl font-semibold leading-tight" :style="`color: ${answeringTeam.color}`" x-text="answeringTeam.name"></div>
            <div class="text-xs text-slate-500 mt-1.5">Capitano · <span class="text-slate-700 font-medium" x-text="answeringTeam.captain"></span></div>
          </div>
        </template>
      </div>

      <div class="panel panel-tinted p-5 mt-auto" style="border-color: rgba(232,169,60,0.4)">
        <div class="tag mb-2" style="color:var(--gold-deep)">Puntata</div>
        <div class="flex items-baseline gap-2">
          <span class="serif text-6xl font-bold leading-none" style="color:var(--navy)" x-text="question.bet"></span>
          <span class="text-slate-500 text-sm">punti</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="panel px-4 py-3">
          <div class="tag mb-1">Lezione</div>
          <div class="mono text-sm font-semibold" style="color:var(--navy)" x-text="question.lecture"></div>
        </div>
        <div class="panel px-4 py-3">
          <div class="tag mb-1">Difficoltà</div>
          <div class="text-sm">
            <template x-for="i in 3"><span :class="i <= question.difficulty ? 'text-[var(--gold)]' : 'text-slate-200'">★</span></template>
          </div>
        </div>
      </div>
    </aside>

    <!-- Centro: domanda + opzioni -->
    <section class="col-span-6 flex flex-col gap-4">
      <div class="panel p-7">
        <div class="tag mb-3">Domanda</div>
        <p class="serif text-3xl font-medium leading-snug" style="color:var(--ink)" x-text="question.text"></p>
        <div class="text-xs text-slate-500 mt-3 mono" x-text="question.lecture + ' · ' + question.topic"></div>
      </div>
      <div class="grid grid-cols-2 gap-3 flex-1">
        <template x-for="opt in question.options" :key="opt.letter">
          <div class="panel p-5 flex items-center gap-4 transition-all"
               :class="phase === 'reveal' && (opt.letter === question.correct ? 'reveal-correct' : 'reveal-wrong')">
            <div class="opt-letter serif text-5xl font-bold w-12 text-center leading-none" style="color:var(--navy)" x-text="opt.letter"></div>
            <div class="text-lg leading-snug" style="color:var(--ink)" x-text="opt.text"></div>
          </div>
        </template>
      </div>
    </section>

    <!-- Destra: countdown -->
    <aside class="col-span-3 flex flex-col items-center">
      <div class="panel w-full p-6 flex flex-col items-center">
        <div class="tag mb-4">Tempo rimanente</div>
        <div class="relative w-60 h-60">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" stroke-width="6" fill="none" class="ring-track"/>
            <circle cx="100" cy="100" r="90" stroke-width="9" fill="none" stroke-linecap="round"
                    class="ring-progress" :class="ringClass()"
                    stroke-dasharray="565.48" :stroke-dashoffset="565.48 * (1 - secondsLeft/totalSeconds)"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span class="serif font-bold tabular-nums text-7xl leading-none"
                  :style="secondsLeft <= 5 ? 'color:var(--danger)' : (secondsLeft <= 10 ? 'color:var(--gold-deep)' : 'color:var(--navy)')"
                  x-text="secondsLeft"></span>
            <span class="tag mt-1.5">secondi</span>
          </div>
        </div>
        <div class="mt-5 text-center">
          <div class="tag">Su</div>
          <div class="serif text-xl font-semibold mt-1" style="color:var(--ink)" x-text="totalSeconds + ' s totali'"></div>
        </div>
      </div>
      <div class="mt-4 w-full flex flex-col gap-2">
        <button @click="reveal()" class="panel px-4 py-3 text-sm hover:bg-slate-50">Mostra risposta</button>
        <button @click="reset()" class="panel px-4 py-3 text-sm text-slate-500 hover:bg-slate-50">↻ Reset countdown</button>
      </div>
    </aside>
  </main>

  <!-- FOOTER -->
  <footer class="panel px-5 py-3 flex items-center justify-between text-xs text-slate-500">
    <span>Master Diritto per l'Innovazione · LM-63 · Università di Udine</span>
    <span class="flex items-center gap-2">
      <span class="pip pip-live"></span>
      <span><span class="font-semibold text-slate-700">16</span> dispositivi connessi</span>
    </span>
    <span class="mono">https://abc1-23.ngrok-free.app</span>
  </footer>

</div>

<script>
function display() {
  return {
    phase: 'question',
    round: 3, totalRounds: 12,
    totalSeconds: 30, secondsLeft: 18,
    askingTeam: { id: 't1', name: 'I Cybernauti', color: '#E8A93C', captain: 'Marta Rossi' },
    answeringTeam: { id: 't3', name: 'Le Algoritmiche', color: '#3795B5', captain: 'Luca Bianchi' },
    teams: [
      { id: 't3', name: 'Le Algoritmiche', color: '#3795B5', score: 220, captain: 'Luca Bianchi', members: 4, bumped: true },
      { id: 't1', name: 'I Cybernauti',    color: '#E8A93C', score: 185, captain: 'Marta Rossi',  members: 3, bumped: false },
      { id: 't2', name: 'Bit & Bot',       color: '#1E3A5F', score: 140, captain: 'Sara Verdi',   members: 4, bumped: false },
      { id: 't4', name: 'I Pixelati',      color: '#7FB9CC', score:  95, captain: 'Davide Neri',  members: 3, bumped: false },
    ],
    question: {
      lecture: 'L11', topic: 'CAD · art. 64-bis', difficulty: 2, bet: 50, target: 'open',
      text: "Quale principio prevede l'art. 64-bis del CAD per l'accesso ai servizi digitali della PA?",
      options: [
        { letter: 'A', text: 'Accesso libero senza autenticazione per tutti i cittadini' },
        { letter: 'B', text: 'Accesso tramite SPID, CIE o CNS come unici strumenti consentiti' },
        { letter: 'C', text: 'Accesso libero ma con tracciamento obbligatorio degli IP' },
        { letter: 'D', text: 'Accesso solo per chi ha una PEC attiva' },
      ],
      correct: 'B',
    },
    init() {
      this._timer = setInterval(() => {
        if (this.phase === 'question' && this.secondsLeft > 0) this.secondsLeft--;
      }, 1000);
    },
    togglePhase() { this.phase = this.phase === 'question' ? 'reveal' : 'question'; },
    reveal() { this.phase = 'reveal'; },
    reset() { this.secondsLeft = this.totalSeconds; this.phase = 'question'; },
    ringClass() {
      if (this.secondsLeft <= 5) return 'danger';
      if (this.secondsLeft <= 10) return 'warn';
      return '';
    },
    barPct(score) {
      const max = Math.max(...this.teams.map(t => t.score), 1);
      return Math.round((score / max) * 100);
    },
  }
}
</script>
</body>
</html>
