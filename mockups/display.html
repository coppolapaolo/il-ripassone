<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Il Ripassone — Display pubblico</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --teal:        #4ABEC8;
    --teal-deep:   #2A8893;
    --coral:       #E84C3D;
    --coral-deep:  #C13E32;
    --yellow:      #F5C44A;
    --yellow-deep: #D9A52F;
    --cream:       #FBF1D9;
    --cream-deep:  #F5E4C3;
    --navy:        #1A2D40;
    --navy-soft:   #2C4665;
    --pink:        #F89A8E;
    --green:       #4FB955;
    --purple:      #9B6BD3;
    --white:       #FFFFFF;
    --success:     #2E9F39;
    --danger:      #E84C3D;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Fredoka', sans-serif;
    color: var(--navy);
    background: var(--cream);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(74,190,200,0.20) 0%, transparent 35%),
      radial-gradient(circle at 85% 100%, rgba(232,76,61,0.12) 0%, transparent 35%),
      radial-gradient(rgba(26,45,64,0.06) 1.4px, transparent 1.4px);
    background-size: auto, auto, 18px 18px;
  }
  .display-font {
    font-family: 'Luckiest Guy', cursive;
    letter-spacing: 0.02em; -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Cartoon card with offset shadow (neobrutalism) */
  .toon {
    background: #fff;
    border: 3px solid var(--navy);
    border-radius: 20px;
    box-shadow: 6px 6px 0 var(--navy);
    position: relative;
  }
  .toon-sm { box-shadow: 4px 4px 0 var(--navy); border-radius: 14px; }
  .toon-lg { box-shadow: 8px 8px 0 var(--navy); border-radius: 28px; }

  .toon-yellow { background: var(--yellow); }
  .toon-coral  { background: var(--coral); color: #fff; }
  .toon-teal   { background: var(--teal);  color: #fff; }
  .toon-cream  { background: var(--cream); }

  /* Outlined display title */
  .title-outlined {
    color: #fff;
    -webkit-text-stroke: 2px var(--navy);
    text-shadow:
      4px 4px 0 var(--navy),
      4px 4px 0 var(--navy);
  }

  .ribbon-bar {
    height: 14px;
    background: repeating-linear-gradient(
      45deg,
      var(--coral) 0 14px,
      var(--cream-deep) 14px 28px,
      var(--teal) 28px 42px,
      var(--cream-deep) 42px 56px,
      var(--yellow) 56px 70px,
      var(--cream-deep) 70px 84px
    );
    border-radius: 99px;
    border: 3px solid var(--navy);
    box-shadow: 4px 4px 0 var(--navy);
  }

  /* Countdown ring */
  .ring-track    { stroke: var(--cream-deep); }
  .ring-progress { stroke: var(--teal-deep); transition: stroke-dashoffset 1s linear, stroke 0.3s; stroke-linecap: round; }
  .ring-progress.warn   { stroke: var(--yellow-deep); }
  .ring-progress.danger { stroke: var(--coral); animation: pulse 0.7s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.97); } }

  /* Countdown grande del display (drammatico) */
  .cd-ring { background: #fff; transition: all 0.3s; }
  .countdown-display.cd-warn   .cd-ring { background: linear-gradient(135deg, #FFF7E0 0%, #FBF1D9 100%); }
  .countdown-display.cd-danger .cd-ring {
    background: linear-gradient(135deg, #FFE4E0 0%, #FFD0CB 100%);
    border-color: var(--coral);
    box-shadow: 8px 8px 0 var(--coral);
    animation: cdShake 0.5s ease-in-out infinite;
  }
  @keyframes cdShake {
    0%,100% { transform: translateX(0) rotate(0); }
    25%     { transform: translateX(-3px) rotate(-1deg); }
    75%     { transform: translateX(3px) rotate(1deg); }
  }
  .countdown-display.cd-warn   { animation: cdScale 1s ease-in-out infinite; }
  .countdown-display.cd-danger { animation: cdScale 0.7s ease-in-out infinite; }
  @keyframes cdScale { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }

  /* Score bump */
  @keyframes scoreUp {
    0%   { transform: translateY(0) scale(1); color: var(--navy); }
    35%  { transform: translateY(-8px) scale(1.2); color: var(--success); }
    100% { transform: translateY(0) scale(1); color: var(--navy); }
  }
  .score-bump { animation: scoreUp 1.4s ease-out; display:inline-block; }

  /* Reveal */
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-1.5deg); }
    75% { transform: rotate(1.5deg); }
  }
  .reveal-correct {
    background: linear-gradient(180deg, #DEF7E1 0%, #C5F0CD 100%) !important;
    border-color: var(--success) !important;
    box-shadow: 6px 6px 0 var(--success), 0 0 0 0 rgba(0,0,0,0);
    animation: wiggle 0.8s ease-in-out;
  }
  .reveal-correct .opt-letter {
    background: var(--success) !important; color: #fff !important; border-color: var(--navy) !important;
  }
  .reveal-wrong { opacity: 0.45; }

  /* Squadre band */
  .team-cell { padding: 14px 16px 12px; position: relative; }
  .team-cell + .team-cell { border-left: 3px solid var(--navy); }
  .team-cell.highlight-asking {
    background: var(--yellow);
  }
  .team-cell.highlight-answering {
    background: var(--teal); color: #fff;
  }
  .team-cell.highlight-answering .text-slate-500 { color: rgba(255,255,255,0.85) !important; }

  /* Status pip */
  .pip { width: 8px; height: 8px; border-radius: 99px; display: inline-block; border: 1.5px solid var(--navy); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pip-live { background: var(--green); animation: blink 1.6s ease-in-out infinite; }

  /* CTA buttons */
  .btn-toon {
    background: #fff;
    border: 3px solid var(--navy);
    border-radius: 12px;
    padding: 8px 16px;
    box-shadow: 4px 4px 0 var(--navy);
    transition: transform 0.1s, box-shadow 0.1s;
    font-weight: 600; color: var(--navy);
  }
  .btn-toon:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--navy); }

  /* Star sparkles around question */
  .sparkle {
    position: absolute; pointer-events: none;
    width: 26px; height: 26px;
    color: var(--yellow);
  }

  .opt-letter {
    width: 72px; height: 72px;
    background: var(--cream-deep); color: var(--navy);
    border: 3px solid var(--navy); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Luckiest Guy', cursive; font-size: 44px;
    box-shadow: 3px 3px 0 var(--navy);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div x-data="display()" class="min-h-screen flex flex-col p-6 gap-4">

  <!-- HEADER: hero compatto + round + countdown -->
  <header class="flex items-center justify-between gap-6">
    <!-- Brand: titolo cartoon CSS (no immagine, scala perfetto) -->
    <div class="flex items-center gap-4">
      <div class="toon toon-yellow toon-sm px-5 py-2.5 -rotate-2">
        <h1 class="display-font text-4xl title-outlined leading-none">IL RIPASSONE!</h1>
      </div>
      <span class="display-font text-sm text-[var(--navy-soft)] uppercase tracking-widest hidden lg:inline">DIPA · L19 · 2026</span>
    </div>

    <!-- Round badge -->
    <div class="toon toon-cream toon-sm px-5 py-2.5 flex items-baseline gap-2.5 rotate-1">
      <span class="display-font text-xs uppercase">Round</span>
      <span class="display-font text-3xl leading-none" x-text="round"></span>
      <span class="text-[var(--navy-soft)]">/</span>
      <span class="display-font text-2xl leading-none" x-text="totalRounds"></span>
    </div>

    <!-- Countdown — grande, drammatico, sempre visibile -->
    <div class="countdown-display flex items-center gap-4"
         :class="secondsLeft <= 5 ? 'cd-danger' : (secondsLeft <= 10 ? 'cd-warn' : '')">
      <!-- label colonna -->
      <div class="text-right">
        <div class="display-font text-2xl uppercase leading-none"
             :style="secondsLeft <= 5 ? 'color:var(--coral)' : (secondsLeft <= 10 ? 'color:var(--yellow-deep)' : 'color:var(--navy-soft)')">
          <span x-show="secondsLeft > 5">⏱ Tempo!</span>
          <span x-show="secondsLeft <= 5" class="display-font text-2xl">⚠ Forza!</span>
        </div>
        <div class="text-sm text-[var(--navy-soft)] mt-1.5" x-text="'Su ' + totalSeconds + ' s totali'"></div>
      </div>
      <!-- ring grande -->
      <div class="cd-ring w-44 h-44 relative flex items-center justify-center toon">
        <svg class="absolute inset-2 -rotate-90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="44" stroke-width="9" fill="none" class="ring-track"/>
          <circle cx="50" cy="50" r="44" stroke-width="11" fill="none"
                  class="ring-progress" :class="ringClass()"
                  stroke-dasharray="276.46" :stroke-dashoffset="276.46 * (1 - secondsLeft/totalSeconds)"/>
        </svg>
        <span class="display-font tabular-nums leading-none relative"
              :style="secondsLeft <= 5 ? 'color:var(--coral); font-size:104px;' : (secondsLeft <= 10 ? 'color:var(--yellow-deep); font-size:104px;' : 'color:var(--navy); font-size:104px;')"
              x-text="secondsLeft"></span>
      </div>
    </div>
  </header>

  <!-- RIBBON decorativo -->
  <div class="ribbon-bar"></div>

  <!-- LEADERBOARD strip — band orizzontale con stile cartoon -->
  <section class="toon overflow-hidden">
    <div class="grid" :style="`grid-template-columns: repeat(${teams.length}, minmax(0, 1fr));`">
      <template x-for="(t, idx) in teams" :key="t.id">
        <div class="team-cell"
             :class="t.id === askingTeam.id ? 'highlight-asking' : (t.id === answeringTeam.id ? 'highlight-answering' : '')">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-baseline gap-2 min-w-0">
              <span class="display-font text-lg" :style="`color: ${t.color}`" x-text="'#'+(idx+1)"></span>
              <span class="display-font text-xl truncate" :style="`color: ${t.color}; -webkit-text-stroke: 0.5px var(--navy);`" x-text="t.name"></span>
            </div>
            <template x-if="t.id === askingTeam.id">
              <span class="display-font text-[11px] uppercase px-1.5 py-0.5 rounded toon-sm bg-white" style="box-shadow: 2px 2px 0 var(--navy); border: 2px solid var(--navy);">PONE</span>
            </template>
            <template x-if="t.id === answeringTeam.id">
              <span class="display-font text-[11px] uppercase px-1.5 py-0.5 rounded toon-sm" style="background:var(--yellow); color:var(--navy); box-shadow: 2px 2px 0 var(--navy); border: 2px solid var(--navy);">RISP.</span>
            </template>
          </div>
          <div class="flex items-baseline gap-1.5">
            <span class="display-font text-4xl tabular-nums leading-none" :class="t.bumped && 'score-bump'" x-text="t.score"></span>
            <span class="text-xs text-slate-500">pt</span>
          </div>
          <div class="text-[11px] text-slate-500 mt-1 truncate" x-text="t.captain + ' · ' + t.members + ' membri'"></div>
        </div>
      </template>
    </div>
  </section>

  <!-- META TURNO -->
  <section class="toon p-3.5 flex items-center gap-5">
    <div class="flex items-center gap-2">
      <span class="display-font text-xs uppercase text-[var(--navy-soft)]">Pone</span>
      <span class="display-font text-xl" :style="`color: ${askingTeam.color}; -webkit-text-stroke: 0.5px var(--navy);`" x-text="askingTeam.name"></span>
    </div>
    <span class="w-1 h-7 rounded-full" style="background: var(--navy)"></span>
    <div class="flex items-center gap-2">
      <span class="display-font text-xs uppercase text-[var(--navy-soft)]">Risponde</span>
      <template x-if="question.target === 'open'">
        <span class="display-font text-xl" style="color:var(--teal-deep); -webkit-text-stroke: 0.5px var(--navy);">APERTA A TUTTI ⚡</span>
      </template>
      <template x-if="question.target !== 'open'">
        <span class="display-font text-xl" :style="`color: ${answeringTeam.color}; -webkit-text-stroke: 0.5px var(--navy);`" x-text="answeringTeam.name"></span>
      </template>
    </div>
    <span class="w-1 h-7 rounded-full" style="background: var(--navy)"></span>
    <div class="flex items-baseline gap-2">
      <span class="display-font text-xs uppercase text-[var(--navy-soft)]">In palio</span>
      <span class="toon-sm toon px-3 py-1 toon-yellow display-font text-2xl leading-none" x-text="question.bet + ' pt'"></span>
    </div>
    <div class="ml-auto flex items-center gap-3">
      <span class="mono text-xs px-2.5 py-1 rounded-md toon-sm toon" style="background:#fff;" x-text="question.lecture + ' · ' + question.topic"></span>
      <span class="text-base">
        <template x-for="i in 3"><span :class="i <= question.difficulty ? 'text-[var(--yellow-deep)]' : 'text-[var(--cream-deep)]'">★</span></template>
      </span>
    </div>
  </section>

  <!-- DOMANDA — DOMINANTE -->
  <section class="flex-1 flex items-center min-h-0 px-6 py-2 relative">
    <!-- Decorative sparkles -->
    <svg class="sparkle top-[-6px] left-2 -rotate-12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
    <svg class="sparkle top-2 right-4 rotate-12" viewBox="0 0 24 24" fill="currentColor" style="color: var(--coral)"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
    <svg class="sparkle bottom-2 right-12 rotate-45" viewBox="0 0 24 24" fill="currentColor" style="color: var(--teal)"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>

    <div class="toon toon-lg w-full p-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="display-font text-xs uppercase tracking-widest px-2 py-1 toon toon-sm toon-coral" style="box-shadow: 3px 3px 0 var(--navy);">Domanda</span>
        <span class="text-sm text-[var(--navy-soft)]" x-text="'Lezione ' + question.lecture.replace('L','') + ' · ' + question.topic"></span>
      </div>
      <p class="display-font" style="font-size: clamp(36px, 4.4vw, 64px); line-height: 1.08; color: var(--navy);" x-text="question.text"></p>
    </div>
  </section>

  <!-- OPZIONI -->
  <section class="grid grid-cols-1 gap-3 px-1">
    <template x-for="opt in question.options" :key="opt.letter">
      <div class="toon toon-sm flex items-center gap-5 px-5 py-3.5"
           :class="phase === 'reveal' && (opt.letter === question.correct ? 'reveal-correct' : 'reveal-wrong')">
        <div class="opt-letter" x-text="opt.letter"></div>
        <div class="text-2xl font-medium leading-snug flex-1" x-text="opt.text"></div>
        <template x-if="phase === 'reveal' && opt.letter === question.correct">
          <span class="display-font text-lg flex items-center gap-1.5 px-3 py-1 toon toon-sm" style="background:var(--success); color:#fff; box-shadow: 3px 3px 0 var(--navy);">
            ✓ CORRETTA!
          </span>
        </template>
      </div>
    </template>
  </section>

  <!-- FOOTER -->
  <footer class="flex items-center justify-between text-xs px-2" style="color: var(--navy-soft)">
    <span class="flex items-center gap-2">
      <span class="pip pip-live"></span>
      <span><span class="display-font text-base text-[var(--navy)]">16</span> dispositivi connessi</span>
    </span>
    <span class="mono text-xs">https://abc1-23.ngrok-free.app</span>
  </footer>

  <!-- PANNELLO DEMO — solo per testare il mockup nel browser.
       NON sarà presente nel display reale: lì le transizioni
       question→reveal e il reset countdown sono triggered dal
       server (timer scade o un capitano risponde). -->
  <div class="fixed bottom-3 right-3 z-40 flex items-center gap-2 toon p-2.5 pl-3"
       style="background: rgba(255,255,255,0.96); border-style: dashed; opacity: 0.85;">
    <span class="display-font text-[10px] uppercase tracking-widest" style="color:var(--navy-soft)">▾ Demo · solo mockup</span>
    <button @click="reveal()" class="btn-toon text-xs">▸ Reveal</button>
    <button @click="reset()" class="btn-toon text-xs">↻ Reset</button>
  </div>

</div>

<script>
function display() {
  return {
    phase: 'question',
    round: 3, totalRounds: 12,
    totalSeconds: 30, secondsLeft: 18,
    askingTeam: { id: 't1', name: 'I CYBERNAUTI', color: '#E8A93C', captain: 'Marta Rossi' },
    answeringTeam: { id: 't3', name: 'LE ALGORITMICHE', color: '#4ABEC8', captain: 'Luca Bianchi' },
    teams: [
      { id: 't3', name: 'LE ALGORITMICHE', color: '#2A8893', score: 220, captain: 'Luca Bianchi', members: 4, bumped: true },
      { id: 't1', name: 'I CYBERNAUTI',    color: '#D9A52F', score: 185, captain: 'Marta Rossi',  members: 3, bumped: false },
      { id: 't2', name: 'BIT & BOT',       color: '#E84C3D', score: 140, captain: 'Sara Verdi',   members: 4, bumped: false },
      { id: 't4', name: 'I PIXELATI',      color: '#9B6BD3', score:  95, captain: 'Davide Neri',  members: 3, bumped: false },
    ],
    question: {
      lecture: 'L11', topic: 'CAD · art. 64-bis', difficulty: 2, bet: 50, target: 'open',
      text: "Quale principio prevede l'art. 64-bis del CAD per l'accesso ai servizi digitali della Pubblica Amministrazione?",
      options: [
        { letter: 'A', text: 'Accesso libero senza autenticazione per tutti i cittadini' },
        { letter: 'B', text: 'Accesso tramite SPID, CIE o CNS come unici strumenti consentiti' },
        { letter: 'C', text: 'Accesso libero ma con tracciamento obbligatorio degli IP' },
        { letter: 'D', text: 'Accesso solo per chi ha una PEC attiva' },
      ],
      correct: 'B',
    },
    init() {
      this._timer = setInterval(() => {
        if (this.phase === 'question' && this.secondsLeft > 0) this.secondsLeft--;
      }, 1000);
    },
    reveal() { this.phase = 'reveal'; },
    reset() { this.secondsLeft = this.totalSeconds; this.phase = 'question'; },
    ringClass() {
      if (this.secondsLeft <= 5) return 'danger';
      if (this.secondsLeft <= 10) return 'warn';
      return '';
    },
  }
}
</script>
</body>
</html>
