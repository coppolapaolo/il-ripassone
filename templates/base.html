<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF1D9">
<title>{% block title %}Il Ripassone{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --teal: #4ABEC8; --teal-deep: #2A8893;
    --coral: #E84C3D; --coral-deep: #C13E32;
    --yellow: #F5C44A; --yellow-deep: #D9A52F;
    --cream: #FBF1D9; --cream-deep: #F5E4C3;
    --navy: #1A2D40; --navy-soft: #2C4665;
    --green: #4FB955; --success: #2E9F39; --danger: #E84C3D;
  }
  [x-cloak] { display: none !important; }
  html, body { height: 100%; }
  body {
    font-family: 'Fredoka', sans-serif;
    color: var(--navy);
    background: var(--cream);
    background-image:
      radial-gradient(circle at 0% 0%, rgba(74,190,200,0.18) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(232,76,61,0.12) 0%, transparent 45%),
      radial-gradient(rgba(26,45,64,0.06) 1.4px, transparent 1.4px);
    background-size: auto, auto, 18px 18px;
  }
  .display-font { font-family: 'Luckiest Guy', cursive; letter-spacing: 0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .toon { background: #fff; border: 3px solid var(--navy); border-radius: 18px; box-shadow: 5px 5px 0 var(--navy); }
  .toon-sm { box-shadow: 3px 3px 0 var(--navy); border-radius: 12px; border-width: 2.5px; }
  .toon-yellow { background: var(--yellow); }
  .toon-coral { background: var(--coral); color: #fff; }
  .toon-teal { background: var(--teal); color: #fff; }
  .title-outlined { color: #fff; -webkit-text-stroke: 2px var(--navy); text-shadow: 3px 3px 0 var(--navy); }
  .pip { width: 7px; height: 7px; border-radius: 99px; display: inline-block; border: 1.5px solid var(--navy); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pip-live { background: var(--green); animation: blink 1.6s ease-in-out infinite; }
  .pip-dead { background: #CCC; }
  .btn-toon {
    background: #fff; border: 3px solid var(--navy); border-radius: 12px;
    padding: 10px 18px; box-shadow: 4px 4px 0 var(--navy);
    transition: transform 0.12s, box-shadow 0.12s;
    font-family: 'Luckiest Guy', cursive; color: var(--navy); cursor: pointer;
  }
  .btn-toon:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--navy); }
  .btn-toon.coral { background: var(--coral); color: #fff; }
  .btn-toon.teal { background: var(--teal); color: #fff; }
  .btn-toon.green { background: var(--green); color: #fff; }
  .btn-toon:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-toon {
    background: #fff; border: 2.5px solid var(--navy); border-radius: 10px;
    padding: 8px 12px; font-size: 14px; box-shadow: 3px 3px 0 var(--navy);
    color: var(--navy); width: 100%;
  }
  .json-pre {
    background: #0F172A; color: #F5C44A;
    padding: 12px; border-radius: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    overflow: auto; max-height: 60vh;
    border: 2.5px solid var(--navy); box-shadow: 3px 3px 0 var(--navy);
  }
  .json-pre .k { color: #4ABEC8; }
  .json-pre .s { color: #4FB955; }
  .json-pre .n { color: #F89A8E; }
  .json-pre .b { color: #F5C44A; font-weight: 700; }
</style>
{% block head_extra %}{% endblock %}
</head>
<body x-data='ripassoneClient({{ role|tojson }})' x-init='connect()'>

{% block body %}{% endblock %}

<!-- Status WS sempre visibile in basso a destra -->
<div class="fixed bottom-3 right-3 z-50 toon-sm toon px-3 py-1.5 flex items-center gap-2"
     style="background: rgba(255,255,255,0.96);">
  <span class="pip" :class="connected ? 'pip-live' : 'pip-dead'"></span>
  <span class="display-font text-xs uppercase">WS · <span x-text="role"></span></span>
  <span class="text-[11px]" style="color:var(--navy-soft)">phase: <b style="color:var(--navy)" x-text="state?.phase"></b></span>
  <template x-if="lastError">
    <span class="text-[11px]" style="color:var(--coral); font-weight:600;" x-text="'⚠ ' + lastError"></span>
  </template>
</div>

<script>
function ripassoneClient(role) {
  return {
    role,
    ws: null,
    connected: false,
    state: null,           // ultimo state/full ricevuto
    lastError: null,
    /* eventi non-state ricevuti, utili al singolo template */
    events: [],
    /* memoria per il client (sopravvive ai refresh) */
    me: JSON.parse(localStorage.getItem('ripassone.me') || 'null'),

    connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      this.ws = new WebSocket(`${proto}://${location.host}/ws`);
      this.ws.onopen = () => { this.connected = true; };
      this.ws.onclose = () => { this.connected = false; };
      this.ws.onerror = () => { this.lastError = 'WebSocket error'; };
      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state/full')      { this.state = msg.data; this.lastError = null; }
        else if (msg.type === 'state/error') { this.lastError = msg.msg; setTimeout(() => this.lastError = null, 5000); }
        else if (msg.type === 'team/joined') {
          this.me = msg.data;
          localStorage.setItem('ripassone.me', JSON.stringify(this.me));
        }
        this.events.unshift(msg);
        if (this.events.length > 50) this.events.length = 50;
      };
    },
    send(type, data = {}) {
      if (!this.ws || this.ws.readyState !== 1) return;
      this.ws.send(JSON.stringify({ type, data }));
    },
    forgetMe() { this.me = null; localStorage.removeItem('ripassone.me'); },
  }
}

/* JSON syntax highlight semplice per i viewer template */
function jsonHL(o) {
  return JSON.stringify(o, null, 2)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("([^"\\]|\\.)*")(\s*:)/g, '<span class="k">$1</span>$3')
    .replace(/:\s*("([^"\\]|\\.)*")/g, ': <span class="s">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="b">$1</span>')
    .replace(/:\s*(-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, ': <span class="n">$1</span>');
}
</script>
</body>
</html>
