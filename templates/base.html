<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF1D9">
<title>{% block title %}Il Ripassone{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --teal: #4ABEC8; --teal-deep: #2A8893;
    --coral: #E84C3D; --coral-deep: #C13E32;
    --yellow: #F5C44A; --yellow-deep: #D9A52F;
    --cream: #FBF1D9; --cream-deep: #F5E4C3;
    --navy: #1A2D40; --navy-soft: #2C4665;
    --green: #4FB955; --success: #2E9F39; --danger: #E84C3D;
  }
  [x-cloak] { display: none !important; }
  html, body { height: 100%; }
  body {
    font-family: 'Fredoka', sans-serif;
    color: var(--navy);
    background: var(--cream);
    background-image:
      radial-gradient(circle at 0% 0%, rgba(74,190,200,0.18) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(232,76,61,0.12) 0%, transparent 45%),
      radial-gradient(rgba(26,45,64,0.06) 1.4px, transparent 1.4px);
    background-size: auto, auto, 18px 18px;
  }
  .display-font { font-family: 'Luckiest Guy', cursive; letter-spacing: 0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .toon { background: #fff; border: 3px solid var(--navy); border-radius: 18px; box-shadow: 5px 5px 0 var(--navy); }
  .toon-sm { box-shadow: 3px 3px 0 var(--navy); border-radius: 12px; border-width: 2.5px; }
  .toon-yellow { background: var(--yellow); }
  .toon-coral { background: var(--coral); color: #fff; }
  .toon-teal { background: var(--teal); color: #fff; }
  .title-outlined {
    color: #fff;
    -webkit-text-stroke: 2px var(--navy);
    text-shadow: 3px 3px 0 var(--navy);
  }
  .pip { width: 7px; height: 7px; border-radius: 99px; display: inline-block; border: 1.5px solid var(--navy); }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pip-live { background: var(--green); animation: blink 1.6s ease-in-out infinite; }
  .pip-dead { background: #CCC; }
  .btn-toon {
    background: #fff; border: 3px solid var(--navy); border-radius: 12px;
    padding: 10px 18px; box-shadow: 4px 4px 0 var(--navy);
    transition: transform 0.12s, box-shadow 0.12s;
    font-family: 'Luckiest Guy', cursive; color: var(--navy); cursor: pointer;
  }
  .btn-toon:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--navy); }
  .btn-toon.coral { background: var(--coral); color: #fff; }
  .btn-toon.teal { background: var(--teal); color: #fff; }
</style>
{% block head_extra %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<!-- WS test widget condiviso da tutte le pagine — solo per Tappa 1 -->
<div x-data="wsTester({{ role|tojson }})" x-init="connect()"
     class="fixed bottom-3 right-3 z-50 toon p-3 max-w-sm" style="opacity: 0.96;">
  <div class="flex items-center justify-between gap-3 mb-2">
    <div class="flex items-center gap-2">
      <span class="pip" :class="connected ? 'pip-live' : 'pip-dead'"></span>
      <span class="display-font text-sm uppercase">WS · <span x-text="role"></span></span>
    </div>
    <span class="text-[11px]" style="color:var(--navy-soft)">connessi: <span class="display-font text-sm" x-text="presence"></span></span>
  </div>
  <div class="flex items-center gap-2 mb-2">
    <input x-model="text" @keydown.enter="ping()" placeholder="messaggio…" class="toon-sm toon px-2 py-1 text-sm flex-1" style="background:#fff;"/>
    <button @click="ping()" class="btn-toon coral text-xs" style="padding: 6px 10px;">ping</button>
  </div>
  <div class="text-[11px] max-h-32 overflow-auto mono space-y-0.5" style="color:var(--navy-soft)">
    <template x-for="(m, i) in log" :key="i">
      <div class="truncate" x-text="m"></div>
    </template>
  </div>
</div>

<script>
function wsTester(role) {
  return {
    role,
    ws: null, connected: false,
    presence: 0, text: '', log: [],
    connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      this.ws = new WebSocket(`${proto}://${location.host}/ws`);
      this.ws.onopen    = () => { this.connected = true;  this.log.unshift('▸ open'); };
      this.ws.onclose   = () => { this.connected = false; this.log.unshift('✕ close'); };
      this.ws.onerror   = () => { this.log.unshift('! error'); };
      this.ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === 'presence') this.presence = m.connected;
        this.log.unshift(`← ${e.data}`);
        if (this.log.length > 30) this.log.length = 30;
      };
    },
    ping() {
      if (!this.text || !this.ws || this.ws.readyState !== 1) return;
      const msg = { from: this.role, text: this.text };
      this.ws.send(JSON.stringify(msg));
      this.log.unshift(`→ ${JSON.stringify(msg)}`);
      this.text = '';
    },
  }
}
</script>
</body>
</html>
